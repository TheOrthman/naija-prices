name: Daily Price Scrape

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install deps
        run: pip install pandas
      
      - name: Run scraper
        run: python -m src.extract.scrape_prices
      
      - name: Commit
        run: |
          git config user.name "Naija Prices Bot"
          git config user.email "bot@naijaprices.ng"
          git add data/raw/*.csv
          git commit -m "Daily update $(date -u +%Y-%m-%d)" || echo "No changes"
          git push