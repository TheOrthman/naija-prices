name: Daily Price Scrape

on:
  schedule:
    - cron: '0 7 * * *'  # 7am UTC = 8am WAT
  workflow_dispatch:  # allows manual run

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pandas requests beautifulsoup4
      
      - name: Run scraper
        run: python src/extract/scrape_prices.py
      
            - name: Commit new data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Naija Prices Bot"
          git config user.email "bot@naijaprices.ng"
          git add data/raw/
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily price update $(date +'%Y-%m-%d')"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git